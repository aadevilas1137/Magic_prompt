name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  ci:
    name: lint / typecheck / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (coverage)
        run: pnpm test -- --coverage

      - name: Build
        run: pnpm build

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: apps/web/coverage
          if-no-files-found: ignore
          retention-days: 7

  e2e:
    name: e2e (Playwright)
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 25
    # Skip if test secrets aren't configured. See `temp_folder/PHASE_2_REPORT.md`
    # for the list of required GitHub Secrets and the rationale behind keeping
    # this opt-in until a separate Supabase test project is provisioned.
    if: |
      vars.SUPABASE_TEST_ENABLED == 'true' || (
        github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'e2e')
      )
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_TEST_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
      DATABASE_URL: ${{ secrets.SUPABASE_TEST_DATABASE_URL }}
      MIGRATE_DATABASE_URL: ${{ secrets.SUPABASE_TEST_MIGRATE_DATABASE_URL }}
      LOG_LEVEL: warn
      CI: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (chromium + webkit)
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Build
        run: pnpm build

      - name: Start dev server (background)
        working-directory: apps/web
        run: |
          pnpm dev > dev-server.log 2>&1 &
          for i in {1..30}; do
            if curl -fs http://localhost:3000/api/health > /dev/null; then
              echo "dev server ready"
              break
            fi
            sleep 2
          done

      - name: Run Playwright
        working-directory: apps/web
        run: pnpm test:e2e --reporter=list

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload dev-server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dev-server-log
          path: apps/web/dev-server.log
          if-no-files-found: ignore
          retention-days: 3
